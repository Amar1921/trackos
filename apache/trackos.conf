# ============================================================
# TrackOS — Apache VirtualHost Production
# /etc/apache2/sites-available/trackos.conf
#
# Structure sur le serveur :
#   /var/www/trackos/server/   → Node.js API + Socket.IO (port 4000)
#   /var/www/trackos/dashboard/dist/  → React build statique
#
# Prérequis :
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl
#   sudo certbot --apache -d trackos.amarsyll.pro -d dash.trackos.amarsyll.pro
# ============================================================


# ────────────────────────────────────────────────────────────
# 1. NODE.JS SERVER — trackos.amarsyll.pro
#    Reçoit : /api/* , /track.js , /socket.io/* , /health
# ────────────────────────────────────────────────────────────

<VirtualHost *:80>
    ServerName trackos.amarsyll.pro
    Redirect permanent / https://trackos.amarsyll.pro/
</VirtualHost>

<VirtualHost *:443>
    ServerName trackos.amarsyll.pro

   # SSLEngine on
   # SSLCertificateFile    /etc/letsencrypt/live/trackos.amarsyll.pro/fullchain.pem
   # SSLCertificateKeyFile /etc/letsencrypt/live/trackos.amarsyll.pro/privkey.pem

    ErrorLog  ${APACHE_LOG_DIR}/trackos-server-error.log
    CustomLog ${APACHE_LOG_DIR}/trackos-server-access.log combined

    # ── Headers sécurité ────────────────────────────────────
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # ── CORS pour track.js (accessible depuis n'importe quel site) ──
    <Location "/track.js">
        Header always set Access-Control-Allow-Origin "*"
        Header always set Cache-Control "public, max-age=3600"
    </Location>

    # ── CORS pour /api/track/* (appelé par les sites trackés) ──
    <LocationMatch "^/api/track/">
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "POST, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type"
    </LocationMatch>

    # ── Proxy WebSocket Socket.IO ────────────────────────────
    RewriteEngine On

    # Upgrade WebSocket
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:4000/$1 [P,L]

    # Proxy HTTP → Node.js
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:4000/
    ProxyPassReverse / http://127.0.0.1:4000/

    # Transmettre l'IP réelle
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Real-IP       "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"
</VirtualHost>


# ────────────────────────────────────────────────────────────
# 2. DASHBOARD REACT — dash.trackos.amarsyll.pro
#    Sert le build statique Vite depuis /var/www/trackos/dashboard/dist
# ────────────────────────────────────────────────────────────

<VirtualHost *:80>
    ServerName dash.trackos.amarsyll.pro
    Redirect permanent / https://dash.trackos.amarsyll.pro/
</VirtualHost>

<VirtualHost *:443>
    ServerName dash.trackos.amarsyll.pro

   # SSLEngine on
   # SSLCertificateFile    /etc/letsencrypt/live/dash.trackos.amarsyll.pro/fullchain.pem
   # SSLCertificateKeyFile /etc/letsencrypt/live/dash.trackos.amarsyll.pro/privkey.pem

    DocumentRoot /var/www/trackos/dashboard/dist

    <Directory /var/www/trackos/dashboard/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # React Router — toutes les routes → index.html
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # Cache long pour assets Vite (hash dans le nom de fichier)
    <LocationMatch "\.(js|css|woff2?|png|svg|ico|webp)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # Pas de cache pour index.html (toujours frais)
    <Location "/index.html">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Pragma "no-cache"
    </Location>

    ErrorLog  ${APACHE_LOG_DIR}/trackos-dashboard-error.log
    CustomLog ${APACHE_LOG_DIR}/trackos-dashboard-access.log combined
</VirtualHost>